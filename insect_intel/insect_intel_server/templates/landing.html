<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insect Intel Server API</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        .container { max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        h1 { color: #333; }
        p { color: #666; }
    </style>

<body>
    <div class="container">
        <h1>Welcome to the Insect Intel Server</h1>

        <p style="margin-top: 20px;">*The API endpoint is live for device testing.*</p>
    </div>
